# Volume
UP add volume +5
DOWN add volume -5
m cycle mute           # toggle mute

# Seek
LEFT seek -3           # 3 seconds backward
RIGHT seek 3           # 3 seconds forward

# Playback controls
SPACE cycle pause
f cycle fullscreen
r cycle loop           # toggle loop for current video

# Subtitles
v cycle sub            # hide/show subtitles
l add sub-delay -0.1       # subtitle delay back
k add sub-delay +0.1       # subtitle delay forward
n ab-loop
# subtitle position
r add sub-pos +1
t add sub-pos -1

# subtitle font size
K add sub-scale +0.1
L add sub-scale -0.1

# Speed control
] speed_set +0.1       # speed up playback
[ speed_set -0.1       # slow down playback
backspace speed_set 1  # reset speed to normal

# Screenshot
s screenshot           # take a screenshot of the video

# Optional: toggle OSD (on-screen display)
o show-text            # toggle mpv info on screen

